[ballerina]
dependencies-toml-version = "2"

[[package]]
org     = "ballerina"
name    = "io"
version = "0.0.1"

[[package]]
org     = "ballerina"
name    = "time"
version = "0.0.1"

[[package]]
org     = "ballerina"
name    = "os"
version = "0.0.1"
dependencies = [
    {org = "ballerina", name = "io"}
]

[[package]]
org     = "ballerina"
name    = "file"
version = "0.0.1"
dependencies = [
    {org = "ballerina", name = "os"},
    {org = "ballerina", name = "time"}
]
